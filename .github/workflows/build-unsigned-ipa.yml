name: Build Unsigned IPA

# 无签名 IPA —— 用爱思助手签名后安装

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Build Frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Add iOS Platform
        working-directory: frontend
        run: npx cap add ios

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync ios

      - name: Set Build Number
        run: |
          BUILD_NUM=$(date +%Y%m%d%H%M)
          echo "BUILD_NUMBER=$BUILD_NUM" >> $GITHUB_ENV

      - name: Diagnose iOS Structure
        working-directory: frontend/ios/App
        run: |
          echo "=== Directory listing ==="
          ls -la
          echo "=== Looking for workspace ==="
          find . -name "*.xcworkspace" -type d 2>/dev/null || echo "No workspace found"
          echo "=== Looking for project ==="
          find . -name "*.xcodeproj" -type d 2>/dev/null || echo "No project found"
          echo "=== Schemes ==="
          xcodebuild -list 2>/dev/null || echo "xcodebuild -list failed"

      - name: Build Unsigned Archive
        working-directory: frontend/ios/App
        run: |
          # Try workspace first (Capacitor 6+), fall back to project
          if [ -f App.xcworkspace/contents.xcworkspacedata ]; then
            xcodebuild archive \
              -workspace App.xcworkspace \
              -scheme App \
              -sdk iphoneos \
              -configuration Release \
              -archivePath ${{ runner.temp }}/App.xcarchive \
              -destination 'generic/platform=iOS' \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              CURRENT_PROJECT_VERSION=${{ env.BUILD_NUMBER }}
          else
            xcodebuild archive \
              -project App.xcodeproj \
              -scheme App \
              -sdk iphoneos \
              -configuration Release \
              -archivePath ${{ runner.temp }}/App.xcarchive \
              -destination 'generic/platform=iOS' \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              CURRENT_PROJECT_VERSION=${{ env.BUILD_NUMBER }}
          fi

      - name: Create Unsigned IPA
        run: |
          mkdir -p ${{ runner.temp }}/export/Payload
          cp -R ${{ runner.temp }}/App.xcarchive/Products/Applications/App.app ${{ runner.temp }}/export/Payload/
          cd ${{ runner.temp }}/export
          zip -r ../App-unsigned.ipa Payload/
          echo "IPA created at ${{ runner.temp }}/App-unsigned.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CS面试助手-unsigned-${{ env.BUILD_NUMBER }}
          path: ${{ runner.temp }}/App-unsigned.ipa
          retention-days: 30
